name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests and migration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: school
          POSTGRES_PASSWORD: ci-password
          POSTGRES_DB: school_erp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U school -d school_erp_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      SECRET_KEY: ci-only-secret-key-with-at-least-32-characters
      SQLALCHEMY_DATABASE_URI: postgresql+asyncpg://school:ci-password@localhost:5432/school_erp_test
      REDIS_URL: redis://localhost:6379/0
      SECURE_COOKIES: "false"
      RUN_INTEGRATION_TESTS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Install backend dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Lint backend
        run: python -m ruff check .
      - name: Apply database migration
        run: python -m alembic upgrade head
      - name: Run backend tests
        run: python -m pytest

  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Lint frontend
        run: npm run lint
      - name: Build frontend
        run: npm run build

  compose:
    name: Validate Compose configuration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose
        env:
          POSTGRES_PASSWORD: compose-ci-password
          SECRET_KEY: compose-ci-secret-key-with-at-least-32-characters
        run: docker compose config --quiet
      - name: Validate staging Compose
        env:
          STAGING_POSTGRES_PASSWORD: staging-compose-ci-password
          STAGING_SECRET_KEY: staging-compose-ci-secret-key-with-at-least-32-characters
          STAGING_ADMIN_EMAIL: staging-admin@example.com
          STAGING_ADMIN_PASSWORD: staging-admin-ci-password
        run: docker compose -f deploy/staging/docker-compose.yml config --quiet
