version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: school_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ops-network

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      # Network DNS routing inside the container bridge
      - SQLALCHEMY_DATABASE_URI=postgresql+asyncpg://postgres:password@db:5432/school_db
      - SECRET_KEY=09d25e094faa6ca2556c818166b7a9563b93f7099f6f0f4caa6cf63b88e8d3e7
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
    depends_on:
      - db
    networks:
      - ops-network

  frontend:
    build:
      context: ./frontend
    ports:
      - "3001:3000"
    environment:
      # Browser client resolves localhost. Server-side rendering would resolve backend:8000
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend
    networks:
      - ops-network

networks:
  ops-network:
    driver: bridge

volumes:
  postgres_data:
